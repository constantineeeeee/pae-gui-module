<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDLT Modelling Tool</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/panels.css" />
    <link rel="stylesheet" href="./styles/widgets.css" />
    <link rel="stylesheet" href="./styles/drawing.css" />

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script type="module" src="./script/main.mjs"></script>
</head>
<body>
    <main>
        <template data-tab-template-id="model-context">
            <section class="model-context tab-area">
                <header>
                    <section class="banner">
                        <input class="model-name-input" 
                            spellcheck="false"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                            placeholder="Untitled Model">
                    </section>
                    <section class="mode-buttons">
                        <button class="action" data-mode="view"><i class="fas fa-eye"></i></button>
                        <button class="action active" data-mode="select"><i class="fas fa-arrow-pointer"></i></button>
                        <div class="v-divider"></div>
                    </section>
                    <section class="action-buttons">
                        <button class="action" data-action="undo"><i class="fas fa-undo"></i></button>
                        <button class="action" data-action="redo"><i class="fas fa-redo"></i></button>
                        <button class="action" data-action="save"><i class="fas fa-save"></i></button>
                        <div class="v-divider"></div>
                        <button class="action" data-action="add"><i class="fas fa-plus"></i></button>
                        <button class="action" data-action="upload"><i class="fas fa-arrow-up-from-bracket"></i></button>
                        <button class="action" data-action="download"><i class="fas fa-arrow-down"></i></button>
                        <div class="v-divider"></div>
                        <button class="action" data-action="settings"><i class="fas fa-sliders"></i></button>
                    </section>
                </header>
                <section class="tab-buttons">
                    <div class="tab-button" data-tab-id="main-model"><i class="fas fa-hexagon-nodes"></i> Main Model</div>
                </section>
                <main class="main-view">
                    <div class="subworkspace tab-area" data-tab-id="main-model">
                        <aside class="left-panels">
                            <section class="tab-buttons">
                                <div class="tab-button" data-tab-id="palette"><i class="fas fa-palette"></i> Palette</div>
                                <div class="tab-button" data-tab-id="components"><i class="fas fa-shapes"></i> Components</div>
                            </section>
                            <main class="panel-tabs">
                                <div class="tab-area panel" data-tab-id="palette" data-panel-id="palette">
                                    <div class="collapsible">
                                        <header>Basic Components</header>
                                        <main>
                                            <section class="palette-group">
                                                <div class="palette-draggable-element" data-element="component" data-component-type="entity">
                                                    <img src="./assets/templates/components/entity.svg">
                                                    Entity
                                                </div>
                                                <div class="palette-draggable-element" data-element="component" data-component-type="boundary">
                                                    <img src="./assets/templates/components/boundary.svg">
                                                    Boundary
                                                </div>
                                                <div class="palette-draggable-element" data-element="component" data-component-type="controller">
                                                    <img src="./assets/templates/components/controller.svg">
                                                    Controller
                                                </div>
                                            </section>
                                        </main>
                                    </div>
                                </div>
                                <div class="tab-area panel" data-tab-id="components" data-panel-id="components">
                                    Components here
                                </div>
                            </main>
                        </aside>
                        <main> 
                            <section class="drawing">
                                <svg></svg>
                            </section>
                        </main>
                        <aside class="right-panels">
                            <section class="tab-buttons">
                                <div class="tab-button" data-tab-id="properties"><i class="fas fa-list-ul"></i> Properties</div>
                                <div class="tab-button" data-tab-id="execute"><i class="fas fa-play"></i> Execute</div>
                                <div class="tab-button" data-tab-id="verifications"><i class="fas fa-circle-check"></i> Verifications</div>
                            </section>
                            <main class="panel-tabs">
                                <div class="tab-area panel" data-tab-id="properties" data-panel-id="properties" data-view-none>
                                    <div data-viewonly="none">
                                        Select a component, arc, or annotation
                                    </div>
                                    <div data-viewonly="component">
                                        <header>
                                            <div><h2>Component</h2></div>
                                            <div><button data-action="remove-component"><i class="fas fa-minus"></i> &nbsp;Remove</button></div>
                                        </header>
                                        <div class="collapsible">
                                            <header>Attributes</header>
                                            <main>
                                                <select class="full-width input-group" name="type">
                                                    <option value="boundary">Boundary</option>
                                                    <option value="entity">Entity</option>
                                                    <option value="controller">Controller</option>
                                                </select>
                                                <section class="columns input-group">
                                                    <div>
                                                        <label>Short identifier</label>
                                                        <input placeholder="x1" class="full-width" name="identifier" />
                                                    </div>
                                                    <div>
                                                        <label>Label</label>
                                                        <input placeholder="Set a label" class="full-width" name="label" />
                                                    </div>
                                                </section>
                                                <section class="input-group checkbox-item">
                                                    <input type="checkbox" name="isRBSCenter"><label>This is the center of an RBS</label>
                                                </section>
                                            </main>
                                        </div>
                                        <div class="collapsible">
                                            <header>Geometry</header>
                                            <main>
                                                <section class="columns input-group">
                                                    <div>
                                                        <label>X</label>
                                                        <input placeholder="0" class="full-width" name="x" type="number"/>
                                                    </div>
                                                    <div>
                                                        <label>Y</label>
                                                        <input placeholder="0" class="full-width" name="y" type="number" />
                                                    </div>
                                                </section>
                                            </main>
                                        </div>
                                        <div class="collapsible">
                                            <header>Styling</header>
                                            <main>
                                            </main>
                                        </div>
                                    </div>
                                    <div data-viewonly="arc">
                                        <header>
                                            <div><h2>Arc</h2></div>
                                            <div><button data-action="remove-arc"><i class="fas fa-minus"></i> &nbsp;Remove</button></div>
                                        </header>
                                        <div class="collapsible">
                                            <header>Vertices</header>
                                            <main class="arcvertices">
                                                <div class="arcvertices-from">
                                                    <div>
                                                        <div>
                                                            <div class="vertex-identifier">v1</div>
                                                            <div class="vertex-type">Entity</div>
                                                        </div>
                                                        <div>
                                                            <img src="./assets/templates/components/entity.svg" height="40" />
                                                        </div>
                                                    </div>
                                                    <button>Properties &nbsp;<i class="fa-solid fa-up-right-from-square"></i></button>
                                                </div>
                                                <div class="arcvertices-arrow-container">
                                                    <img src="./assets/images/arcvertices-arrow.svg" class="arcvertices-arrow" />
                                                </div>
                                                <div class="arcvertices-to">
                                                    <div> 
                                                        <div>
                                                            <img src="./assets/templates/components/boundary.svg" height="40" />
                                                        </div>
                                                        <div>
                                                            <div class="vertex-identifier">v2</div>
                                                            <div class="vertex-type">Boundary</div>
                                                        </div>
                                                    </div>
                                                    <button>Properties &nbsp;<i class="fa-solid fa-up-right-from-square"></i></button>
                                                </div>
                                            </main>
                                        </div>
                                        <div class="collapsible">
                                            <header>Attributes</header>
                                            <main>
                                                <section class="columns input-group">
                                                    <div>
                                                        <label>C-attibute</label>
                                                        <input placeholder="ϵ" class="full-width" name="C" />
                                                    </div>
                                                    <div>
                                                        <label>L-attibute</label>
                                                        <input placeholder="1" class="full-width" name="L" type="number" min="1" step="1" />
                                                    </div>
                                                </section>
                                            </main>
                                        </div>
                                        <div class="collapsible">
                                            <header>Geometry</header>
                                            <main>
                                                <section class="columns input-group" style="align-items: flex-end;">
                                                    <div>
                                                        <label>Path Style</label>
                                                        <select class="full-width" name="pathType">
                                                            <option value="straight">Straight</option>
                                                            <option value="elbowed">Elbowed</option>
                                                        </select>
                                                    </div>
                                                    <div class="checkbox-item" style="margin-bottom: 8px; margin-left: 12px;">
                                                        <input type="checkbox" name="isAutoDraw"><label>Auto Draw</label>
                                                    </div>
                                                </section>
                                            </main>
                                        </div>
                                        <div class="collapsible">
                                            <header>Styling</header>
                                            <main>
                                            </main>
                                        </div>
                                    </div>
                                </div>
                                <div class="tab-area panel" data-tab-id="execute" data-panel-id="execute">
                                    <div class="collapsible" data-section-id="activities">
                                        <header>Activities</header>
                                        <main>
                                            <table class="anchor-right">
                                                <tbody></tbody>
                                            </table>
                                            <div class="action-buttons">
                                                <button data-subaction="import"><i class="fas fa-file-lines"></i>&nbsp; Import Activity</button>
                                            </div>
                                        </main>
                                    </div>
                                    <div class="collapsible" data-section-id="ae">
                                        <header>Activity Extraction</header>
                                        <main>
                                            <div class="input-group">
                                                <label>Activity Name</label>
                                                <input name="name" placeholder="Set a name for the activity" class="full-width" name="C" />
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="input-group">
                                                <label>Mode</label>
                                                <select name="mode" class="full-width">
                                                    <option value="pseudorandom">Pseudo-random selection</option>
                                                    <option value="user">User-based selection</option>
                                                </select>
                                            </div>
                                            <div class="section-action-buttons">
                                                <button data-subaction="generate">Generate</button>
                                                <button data-subaction="simulate"><i class="fas fa-play"></i> &nbsp;Simulate</button>
                                            </div>
                                        </main>
                                    </div>
                                    <div class="collapsible" data-section-id="vs">
                                        <header>Expanded Vertex Simplification</header>
                                        <main>
                                            <table>
                                                <tbody>
                                                    <tr>
                                                        <td>Level 1</td>
                                                        <td><button data-subaction="vs-generate-1"><i class="fas fa-eye"></i> Generate</button></td>
                                                    </tr>
                                                    <tr>
                                                        <td>Level 2</td>
                                                        <td>
                                                            <select name="rbs">
                                                                <option>x1</option>
                                                            </select>
                                                            <button data-subaction="vs-generate-2"><i class="fas fa-eye"></i> Generate</button>
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </main>
                                    </div>
                                </div>
                                <div class="tab-area panel" data-tab-id="verifications" data-panel-id="verifications">
                                    <header>
                                        <h2>Verifications</h2>
                                    </header>
                                    <br/>
                                    <div class="collapsible" data-section-id="poi">
                                        <header>Points of Interest</header>
                                        <main>
                                            <div class="section-description">
                                                Analyze this model for presence of points of delay, synchronicity, deadlocks, reoptimization, and its timeliness of response.
                                            </div>
                                            <div class="section-action-buttons">
                                                <button data-subaction="start"><i class="fas fa-magnifying-glass"></i>&nbsp; Start Analysis</button>
                                            </div>
                                        </main>
                                    </div>
                                    <div class="collapsible" data-section-id="fc">
                                        <header>Free Choiceness</header>
                                        <main>
                                            <div class="section-description">
                                                Verify the input RDLT whether it is free-choice or inconclusive.
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <button data-subaction="start">Start</button>
                                            </div>
                                        </main>
                                    </div>
                                    <div class="collapsible" data-section-id="wh">
                                        <header>Well Handledness</header>
                                        <main>
                                            <div class="section-description">
                                                Verify the input RDLT whether it is well-handled or otherwise.
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <!-- <select name="type">
                                                    <option value="SDPCS">Σ-distinct PCS</option>
                                                </select> -->
                                                <button data-subaction="start">Start</button>
                                            </div>
                                        </main>
                                    </div>
                                    <div class="collapsible" data-section-id="soundness">
                                        <header>Soundness</header>
                                        <main>
                                            <div class="section-description">
                                                Verify the notion of soundness of the input RDLT.
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="input-group">
                                                <div>
                                                    <label>Soundness Notion</label>
                                                    <select name="notion" class="full-width">
                                                        <option value="classical">Classical Soundness</option>
                                                        <option value="relaxed">Relaxed Soundness</option>
                                                        <option value="weak">Weak Soundness</option>
                                                        <option value="easy">Easy Soundness</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <button data-subaction="start">Start</button>
                                            </div>
                                        </main>
                                    </div>

                                    <div class="collapsible" data-section-id="impedance-freeness">
                                        <header>Impedance-Freeness</header>
                                        <main>
                                            <div class="section-description">
                                                Verify the input RDLT whether it is impedance-free.
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <button data-subaction="start">Start</button>
                                            </div>
                                        </main>
                                    </div>

                                    <div class="collapsible" data-section-id="reset-safeness">
                                        <header>Reset-safeness</header>
                                        <main>
                                            <div class="section-description">
                                                Verify whether the model is reset-safe (requires maximal activities and RBS out-bridge synchronization).
                                            </div>
                                            <div class="input-group columns full-width">
                                                <div>
                                                    <label>Source</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="source" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label>Sink</label>
                                                    <div style="display: flex; gap: 6px;">
                                                        <select name="sink" style="flex: 1"></select>
                                                        <button><i class="fas fa-hand"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <button data-subaction="start">Start</button>
                                            </div>
                                        </main>
                                    </div>
                                </div>
                            </main>
                        </aside>
                    </div>
                    <template data-tab-template-id="aes">
                        <div class="subworkspace tab-area aes-subworkspace">
                            <aside class="left-panels">
                                <section class="tab-buttons">
                                    <div class="tab-button" data-tab-id="configs">Configurations</div>
                                    <div class="tab-button" data-tab-id="steps">Steps</div>
                                </section>
                                <main class="panel-tabs">
                                    <div class="tab-area panel" data-tab-id="configs" data-panel-id="configs">
                                        <div class="collapsible">
                                            <header>Properties</header>
                                            <main>
                                                <div class="input-group">
                                                    <label>Activity Name</label>
                                                    <input name="name" placeholder="Set a name for the activity" class="full-width" name="C" />
                                                </div>
                                                <div class="input-group columns full-width">
                                                    <div style="flex: 1">
                                                        <label>Source</label>
                                                        <div data-aes-detail="source">
                                                            <div class="vertex-display"></div>
                                                            <span></span>
                                                        </div>
                                                    </div>
                                                    <div style="flex: 1">
                                                        <label>Sink</label>
                                                        <div data-aes-detail="sink">
                                                            <div class="vertex-display"></div>
                                                            <span></span>
                                                        </div>
                                                    </div>
                                                    <div style="flex: 2">
                                                        <label>Mode</label>
                                                        <span data-aes-detail="mode"></span>
                                                    </div>
                                                </div>
                                                <div class="section-action-buttons">
                                                    <button data-aes-action="save"><i class="fas fa-save"></i>&nbsp; Save Activity</button>
                                                </div>
                                            </main>
                                        </div>
                                    </div>
                                    <div class="tab-area panel" data-tab-id="steps" data-panel-id="steps">
                                        <header><h2>Activity Extraction Steps</h2></header>
                                        <main>
                                            <table class="row-clickable">
                                                <thead><tr>
                                                    <th>#</th>
                                                    <th>Action</th>
                                                    <th>Component</th>
                                                    <th>Remarks</th>
                                                </tr></thead>
                                                <tbody></tbody>
                                            </table>
                                        </main>
                                    </div>
                                </main>
                            </aside>
                            <main class="aes-main">
                                <header>
                                    <div>
                                        <h1>Live Activity Extraction</h1>
                                        via <b class="aes-mode-label">Pseudorandom Selection</b>
                                    </div>
                                    <div class="aes-status-view">
                                        <div class="aes-step-indicator"></div> 
                                        <span class="aes-step-label"></span>
                                        <div class="arc-tag"><div class="arc-tag-from">x1</div><div class="arc-tag-to">x2</div></div>
                                        <div class="vertex-tag">x1</div>
                                    </div>
                                    <div class="aes-status-view-choosing">
                                        <div class="aes-status-view-choosing-chip">
                                            <i class="fas fa-circle-info"></i>&nbsp;
                                            Please choose an arc to explore
                                        </div>
                                    </div>
                                    <div class="aes-quick-controls">
                                        <button data-aes-action="random"><i class="fas fa-shuffle"></i></button>
                                        <button data-aes-action="repeat"><i class="fas fa-rotate-right"></i></button>
                                        <!-- <button data-aes-action="pause"><i class="fas fa-pause"></i></button> -->
                                        <button data-aes-action="prev"><i class="fas fa-backward-step"></i></button>
                                        <button data-aes-action="next"><i class="fas fa-forward-step"></i></button>
                                    </div>
                                </header>
                                <main>
                                    <section class="drawing">
                                        <svg></svg>
                                    </section>
                                </main>
                            </main>
                            <aside class="right-panels">
                                <section class="tab-buttons">
                                    <div class="tab-button" data-tab-id="states">States</div>
                                    <div class="tab-button" data-tab-id="profile">Activity Profile</div>
                                </section>
                                <main class="panel-tabs">
                                    <div class="tab-area panel" data-tab-id="states" data-panel-id="states">
                                        <header>
                                            <h2>Current Arc States</h2>
                                        </header> 
                                        <table class="anchor-right">
                                            <thead><tr>
                                                <th>Arc</th>
                                                <th>Attributes</th>
                                                <th>T</th>
                                            </tr></thead>
                                            <tbody></tbody>
                                        </table>
                                    </div>
                                    <div class="tab-area panel" data-tab-id="profile" data-panel-id="profile">
                                        <header><h2>Activity Profile</h2></header>
                                        <main>
                                            <table>
                                                <thead><tr></tr></thead>
                                                <tbody></tbody>
                                            </table>
                                        </main>
                                    </div>
                                </main>
                            </aside>
                        </div>
                    </template>
                    <template data-tab-template-id="ver">
                        <div class="subworkspace tab-area ver-subworkspace">
                            <main class="ver-main">
                                <header>
                                    <div>
                                        <h1>Lorem Ipsum</h1>
                                    </div>
                                    <div></div>
                                    <div class="ver-controls">
                                        <select><option>Main Model</option></select>
                                    </div>
                                </header>
                                <main>
                                    <section class="drawing">
                                    </section>
                                </main>

                                <div id="myModal" class="modal">

                                    <!-- Modal content -->
                                   <div class="modal-content">
                                       <div class="modal-header">
                                       <span class="close">&times;</span>
                                       <h2>Modal Header</h2>
                                       </div>
                                       <div class="modal-body">
                                       <p>Some text in the Modal Body</p>
                                       <p>Some other text...</p>
                                       </div>
                                       <div class="modal-footer">
                                       <h3>Modal Footer</h3>
                                       </div>
                                   </div> 
                               
                               </div>
                            </main>
                            <aside class="right-panels">
                                <section class="tab-buttons">
                                    <div class="tab-button" data-tab-id="result">Result</div>
                                </section>
                                <main class="panel-tabs">
                                    <div class="tab-area panel" data-tab-id="result" data-panel-id="result">
                                        <header>
                                            <h2>Result</h2>
                                        </header>
                                        <div class="conclusion-chip">
                                            <div class="conclusion-title">Some title</div>
                                            <div class="conclusion-description">Some description</div>
                                        </div>
                                        <div class="collapsible" data-ver-section="criteria">
                                            <header>Criteria</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div> 
                                        <div class="collapsible" data-ver-section="v-arcs">

                                            <main>
                                                <table>

                                                </table>
                                            </main>

                                            <header>Violating Vertices</header>

                                                <table>
                                                    <tbody>
                                                        <tr>
                                                            <td><div class="vertex-tag">x1</div></td>

                                                        <tr>
                                                            <td><div class="vertex-tag">x2</div></td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </main>
                                        </div>
                                        <button data-subaction="simulate-mae">Simulate</button>
                                        
                                    </div>
                                </main>
                            </aside>
                        </div>

                    <template data-tab-template-id="vs">

                                    <div>
                                        <h1>Vertex Simplification</h1>
                                        <div class="vs-level-label">Level 1</div>
                                    </div>
                                    <div></div>
                                    <div>
                                        <button data-vs-action="open"><i class="fas fa-arrow-up-right-from-square"></i>&nbsp; Open as Model</button>
                                    </div>
                                </header>
                                <main>
                                    <section class="drawing">
                                        <svg></svg>
                                    </section>
                                </main>
                            </main>
                        </div>
                    </template>
                    <template data-tab-template-id="as">
                        <div class="subworkspace tab-area as-subworkspace">

                                <section class="tab-buttons">
                                    <div class="tab-button" data-tab-id="details">Details</div>
                                </section>
                                <main class="panel-tabs">
                                    <div class="tab-area panel" data-tab-id="details" data-panel-id="details">
                                        <header><h2>Activity Details</h2></header>
                                        <main>
                                            <div class="conclusion-chip">
                                                <div class="conclusion-title">Some title</div>
                                                <div class="conclusion-description">Some description</div>
                                            </div>
                                            <div class="collapsible">
                                                <header>Properties</header>
                                                <main>
                                                    <div class="input-group">
                                                        <label>Activity Name</label>
                                                        <div data-as-detail="name">Some Activity 1</div>
                                                    </div>
                                                    <div class="input-group columns full-width">
                                                        <div>
                                                            <label>Source</label>
                                                            <div data-as-detail="source">
                                                                <div class="vertex-display"></div>
                                                                <span></span>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label>Sink</label>
                                                            <div data-as-detail="sink">
                                                                <div class="vertex-display"></div>
                                                                <span></span>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label>Origin</label>
                                                            <span data-as-detail="origin">Simulated</span>
                                                        </div>
                                                    </div>
                                                </main>
                                            </div>
                                        </main>
                                    </div>
                                </main>
                            </aside>
                            <main class="as-main">
                                <header>
                                    <div>
                                        <h1>Activity Simulation</h1>
                                    </div>
                                    <div class="as-status-view"></div>
                                    <div class="as-quick-controls">
                                        <button data-as-action="prev"><i class="fas fa-backward-step"></i></button>
                                        <button data-as-action="next"><i class="fas fa-forward-step"></i></button>
                                    </div>
                                </header>
                                <main>
                                    <section class="drawing">
                                        <svg></svg>
                                    </section>
                                </main>
                            </main>
                            <aside class="right-panels">
                                <section class="tab-buttons">
                                    <div class="tab-button" data-tab-id="profile">Activity Profile</div>

                                    <div class="tab-area panel" data-tab-id="profile" data-panel-id="profile">

                                        <main>
                                            <table>
                                                <thead><tr></tr></thead>
                                                <tbody></tbody>
                                            </table>
                                        </main>
                                    </div>
                                </main>
                            </aside>
                            
                        </div>
                    </template>

                                        <h1>Points of Interest</h1>
                                    </div>
                                    <div></div>
                                    <div class="poi-controls">
                                        <select>
                                            <option value="pod">Points of Delay (PODs)</option>
                                            <option value="pos">Points of Synchronocity (POSs)</option>
                                            <option value="pore">Points of Reoptimization</option>
                                            <option value="deadlocks">Deadlock Points</option>
                                            <option value="shared">Shared Resources</option>
                                            <option value="tor">Timeliness of Response</option>
                                        </select>
                                    </div>
                                </header>
                                <main>
                                    <section class="drawing"><svg></svg></section>
                                </main>
                            </main>
                            <aside class="right-panels">

                                    <div class="tab-button" data-tab-id="poi">POIs</div>
                                </section>
                                <main class="panel-tabs">
                                    <div class="tab-area panel" data-tab-id="poi" data-panel-id="poi">

                                            <h2>Points of Interest</h2>
                                        </header>
                                        <br>
                                        <div class="collapsible" data-poi-section="pod">
                                            <header>Points of Delay (PODs)</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div>
                                        <div class="collapsible" data-poi-section="pos">
                                            <header>Points of Synchronicity (POSs)</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div>
                                        <div class="collapsible" data-poi-section="shared">
                                            <header>Shared Resources</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div>
                                        <div class="collapsible" data-poi-section="deadlocks">
                                            <header>Deadlock Points</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div>
                                        <div class="collapsible" data-poi-section="tor">
                                            <header>Timeliness of Response</header>
                                            <main>
                                                <table class="anchor-right">
                                                    <thead>
                                                        <tr>
                                                            <th>Vertex</th>
                                                            <th>Time Reached</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div> 
                                        <div class="collapsible" data-poi-section="pore">
                                            <header>Points of Reoptimization</header>
                                            <main>
                                                <table>
                                                    <tbody></tbody>
                                                </table>
                                            </main>
                                        </div> 
                                    </div>
                                </main>
                            </aside>
                        </div>
                    </template>
                </main>
            </section>
        </template>
    </main>
    <footer class="tab-buttons"></footer>
    <div id="tmp"></div>
